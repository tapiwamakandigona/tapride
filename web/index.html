<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Restore path from GitHub Pages 404 SPA redirect trick
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle ?p= query param from 404.html
        var p = window.location.search.match(/[?&]p=([^&]+)/);
        if (p) {
          var path = p[1].replace(/~and~/g, '&');
          var rest = window.location.search.replace(/[?&]p=[^&]+/, '').replace(/^[?&]/, '');
          history.replaceState(null, null,
            window.location.pathname.replace(/\/$/, '') + '/' + path +
            (rest ? '?' + rest : '') + window.location.hash
          );
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚖</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TapRide</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
