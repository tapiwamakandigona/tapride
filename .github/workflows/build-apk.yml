name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/TapRide-${{ steps.version.outputs.VERSION }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: TapRide ${{ steps.version.outputs.VERSION }}
          body: |
            ## TapRide ${{ steps.version.outputs.VERSION }}

            ### What's included
            - Ride-hailing app with real-time tracking
            - Rider & Driver modes
            - In-app chat and rating system
            - Dark/Light theme

            ### Installation
            1. Download `TapRide-${{ steps.version.outputs.VERSION }}.apk`
            2. Enable "Install from unknown sources" on your device
            3. Install and enjoy!

            ---
            *Made by Tapiwa Makandigona*
          files: release/TapRide-${{ steps.version.outputs.VERSION }}.apk
          draft: false
          prerelease: false
