<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TapRide</title>
    <!--
      [INTENT] GitHub Pages SPA redirect hack.
      GH Pages serves this 404.html for any unknown path. This script converts the
      current path into a query-string redirect to index.html, which then restores
      the original URL via sessionStorage before React Router mounts.
      [CONSTRAINT] Must match the `base` path configured in vite.config.ts (/tapride/).
      [EDGE-CASE] Paths with query strings or hashes are preserved through the redirect.
      See: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var pathSegmentsToKeep = 1; // '/tapride' = 1 segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
