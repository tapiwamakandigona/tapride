<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tapride/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a6df5" />
    <meta name="description" content="TapRide - Fast, reliable rides at your fingertips" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TapRide - Ride Hailing" />
    <meta property="og:description" content="Fast, reliable rides at your fingertips. Request a ride or drive and earn." />
    <meta property="og:image" content="/tapride/og-image.png" />
    <meta property="og:url" content="https://tapiwa.me/tapride/" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TapRide - Ride Hailing" />
    <meta name="twitter:description" content="Fast, reliable rides at your fingertips." />
    <meta name="twitter:image" content="/tapride/og-image.png" />
    <!-- PWA -->
    <link rel="apple-touch-icon" href="/tapride/favicon.svg" />
    <link rel="manifest" href="/tapride/manifest.json" />
    <title>TapRide</title>
    <!-- Cache-busting: GitHub Pages sets aggressive cache headers (max-age=86400).
         These meta tags tell browsers not to serve stale index.html. JS/CSS files
         use content hashes in filenames so they're fine — it's index.html that gets stale. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- DNS prefetch / preconnect for critical origins -->
    <link rel="preconnect" href="https://bswikdlxlutpdaweuohi.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://bswikdlxlutpdaweuohi.supabase.co" />
    <link rel="dns-prefetch" href="https://tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://nominatim.openstreetmap.org" />
    <!-- SPA redirect decoder — matches the encoding in 404.html.
         Runs inline before any JS bundle loads for fastest possible URL restoration. -->
    <script>
      (function() {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var path = decodeURIComponent(p);
          var q = params.get('q') ? '?' + decodeURIComponent(params.get('q')) : '';
          var h = params.get('h') ? decodeURIComponent(params.get('h')) : '';
          var base = window.location.pathname.replace(/\/$/, '');
          window.history.replaceState(null, '', base + path + q + h);
        }
      })();
    </script>
  </head>
  <body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
